{% extends 'base.html' %}
{% block content %}

<div class="card">

    <h2>📊 Expense Analytics</h2>

    <!-- TOTAL -->
    <div style="margin:10px 0; font-size:18px;">
        💰 Total Expense: <b id="total">0</b>
    </div>

    <!-- FILTER -->
    <select id="filter" class="filter">
        <option value="day">Today</option>
        <option value="week">Last 7 Days</option>
        <option value="month" selected>Last 30 Days</option>
        <option value="year">Last 1 Year</option>
    </select>

    <!-- CHART -->
    <div style="height: 380px; margin-top:20px;">
        <canvas id="chart"></canvas>
    </div>

    <!-- NO DATA -->
    <p id="noData" style="display:none; color:#94a3b8; margin-top:10px;">
        No expense data available
    </p>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let chartInstance = null;

async function loadChart() {

    const filterValue = document.getElementById("filter").value;

    const res = await fetch("/analytics-data?filter=" + filterValue);
    const data = await res.json();

    // TOTAL
    document.getElementById("total").innerText = "₹ " + data.total;

    const noData = document.getElementById("noData");

    // NO DATA CASE
    if (!data.categories || data.categories.length === 0) {

        if (chartInstance) chartInstance.destroy();

        noData.style.display = "block";
        return;
    }

    noData.style.display = "none";

    const ctx = document.getElementById("chart").getContext("2d");

    // destroy old chart
    if (chartInstance) {
        chartInstance.destroy();
    }

    // BAR CHART (BEST FOR EXPENSE ANALYTICS)
    chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: data.categories,
            datasets: [{
                label: "Expenses (₹)",
                data: data.amounts,
                backgroundColor: "#60a5fa"
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

// initial load
loadChart();

// filter change
document.getElementById("filter").addEventListener("change", loadChart);

</script>

{% endblock %}

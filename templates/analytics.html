{% extends 'base.html' %}
{% block content %}

<h2>Analytics</h2>

<select id="filter">
    <option value="month">Month</option>
</select>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
fetch("{{ url_for('chart') }}")
.then(res => res.json())
.then(data => {
    new Chart(document.getElementById('chart'), {
        type: 'pie',
        data: {
            labels: data.categories,
            datasets: [{
                data: data.amounts
            }]
        }
    });
});
</script>

{% endblock %}

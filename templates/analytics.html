{% extends 'base.html' %}
{% block content %}

<div class="card">

    <h2>📊 Expense Analytics</h2>

    <h3>💰 Total Expense: ₹ <span id="total">0</span></h3>

    <select id="filter" style="margin:10px 0; padding:8px;">
        <option value="day">Day</option>
        <option value="week">Week</option>
        <option value="month" selected>Month</option>
        <option value="year">Year</option>
    </select>

    <!-- ✅ IMPORTANT FIX: explicit height -->
    <div style="position:relative; height:400px; width:100%;">
        <canvas id="chart"></canvas>
    </div>

    <p id="noData" style="display:none; color:gray;">
        No expense data available
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let chart = null;

function loadAnalytics() {

    const filter = document.getElementById("filter").value;

    fetch(`/analytics-data?filter=${filter}`)
        .then(res => res.json())
        .then(data => {

            console.log("API DATA:", data); // 🔥 DEBUG

            document.getElementById("total").innerText = data.total || 0;

            const ctx = document.getElementById("chart");

            if (!data.categories || data.categories.length === 0) {

                if (chart) chart.destroy();

                document.getElementById("noData").style.display = "block";
                return;
            }

            document.getElementById("noData").style.display = "none";

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.categories,
                    datasets: [{
                        data: data.amounts,
                        backgroundColor: [
                            '#60a5fa',
                            '#34d399',
                            '#fbbf24',
                            '#f87171',
                            '#a78bfa',
                            '#38bdf8'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

        })
        .catch(err => {
            console.error("Chart error:", err);
        });
}

// ✅ IMPORTANT: run after page fully loads
window.onload = function () {
    loadAnalytics();

    document.getElementById("filter").addEventListener("change", loadAnalytics);
};

</script>

{% endblock %}

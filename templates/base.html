<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasa Expense</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="nav-left">

            <!-- LOGO -->
            <a href="{{ url_for('expenses.dashboard') }}" class="logo">
                💰 Vasa Expense
            </a>

            {% if session.get('user_id') %}

                {% if session.get('role') == 'admin' %}
                    <a href="{{ url_for('admin.admin_dashboard') }}">Admin</a>
                {% else %}
                    <a href="{{ url_for('expenses.dashboard') }}">Dashboard</a>

                    <!-- ✅ FIX HERE -->
                    <a href="{{ url_for('auth.analytics') }}">Analytics</a>

                {% endif %}

            {% else %}
                <a href="{{ url_for('auth.login') }}">Login</a>
                <a href="{{ url_for('auth.register') }}">Register</a>
            {% endif %}

        </div>

        <div class="nav-right">

            {% if session.get('user_id') %}
                <a href="{{ url_for('auth.logout') }}" class="logout-btn">Logout</a>
            {% endif %}

        </div>

    </nav>

    <!-- CONTENT -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>

</html>

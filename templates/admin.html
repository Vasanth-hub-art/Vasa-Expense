{% extends 'base.html' %}
{% block content %}

<h2>Admin Dashboard</h2>

<h3>Users</h3>
<table>
<tr><th>ID</th><th>Username</th></tr>
{% for u in users %}
<tr>
    <td>{{ u.id }}</td>
    <td>{{ u.username }}</td>
</tr>
{% endfor %}
</table>

<h3>Expenses</h3>
<table>
<tr>
    <th>User</th>
    <th>Amount</th>
    <th>Category</th>
    <th>Date</th>
</tr>

{% for e in expenses %}
<tr>
    <td>{{ e.username }}</td>
    <td>{{ e.amount }}</td>
    <td>{{ e.category }}</td>
    <td>{{ e.date }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}

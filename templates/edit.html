{% extends 'base.html' %}
{% block content %}

<div class="card">

    <h2>Edit Expense</h2>

    <form method="POST">

        <input name="amount" value="{{ e.amount }}" required>

        <select name="category_id">
            {% for c in categories %}
                <option value="{{ c.id }}"
                    {% if c.id == e.category_id %}selected{% endif %}>
                    {{ c.name }}
                </option>
            {% endfor %}
        </select>

        <input name="date" value="{{ e.date }}" required>
        <input name="description" value="{{ e.description }}">

        <button>Update</button>

    </form>

</div>

{% endblock %}
